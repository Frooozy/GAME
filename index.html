<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dimension Jumper: Обновление Двойной Прыжок</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas { display: block; }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #ui-bar {
            position: absolute; top: 15px; left: 0; width: 100%;
            display: none; justify-content: center; gap: 15px;
            pointer-events: none; z-index: 10;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            flex-wrap: wrap;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.6); color: #fff;
            padding: 8px 15px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 18px; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .c-lvl { color: #00d2ff; text-shadow: 0 0 10px #00d2ff; } 
        .c-hp { color: #ff4757; text-shadow: 0 0 10px #ff4757; } 
        .c-ammo { color: #2ed573; text-shadow: 0 0 10px #2ed573; } 
        .c-coins { color: #ffa502; text-shadow: 0 0 10px #ffa502; }
        .c-death { color: #a4b0be; text-shadow: 0 0 10px #ffffff; }
        .c-kills { color: #a55eea; text-shadow: 0 0 10px #a55eea; }

        /* ИНТЕРФЕЙС БОССА */
        #boss-hp-wrapper {
            display: none; flex-direction: column; align-items: center;
            position: absolute; bottom: 30px; width: 100%; pointer-events: none;
        }
        #boss-hp-border { 
            width: 60%; height: 20px; 
            border: 2px solid rgba(255,255,255,0.5); 
            background: rgba(0,0,0,0.8); border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
        #boss-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #c0392b, #e74c3c); transition: width 0.1s; }
        #boss-label { color: #ff4757; font-weight: bold; font-size: 28px; margin-bottom: 5px; text-shadow: 0 0 15px #ff0000; letter-spacing: 3px; }

        /* ЭКРАНЫ МЕНЮ И МАГАЗИНА */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { 
            font-size: 70px; color: #fff; margin-bottom: 10px; 
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff, 0 0 40px #00d2ff;
            font-family: 'Arial Black', sans-serif;
            text-align: center;
        }
        .menu-stats { color: #aaa; font-size: 20px; margin-bottom: 30px; font-family: monospace; }
        
        .btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b); 
            color: white; border: none; padding: 15px 50px; font-size: 24px; font-weight: bold;
            margin: 15px; cursor: pointer; border-radius: 50px; 
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase; width: 300px; text-align: center;
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.5);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 75, 43, 0.8); }
        
        .btn-shop { background: linear-gradient(45deg, #f7971e, #ffd200); box-shadow: 0 0 15px rgba(255, 210, 0, 0.5); color: #000; }
        .btn-shop:hover { box-shadow: 0 0 25px rgba(255, 210, 0, 0.8); }
        
        .btn-resume { background: linear-gradient(45deg, #11998e, #38ef7d); box-shadow: 0 0 15px rgba(56, 239, 125, 0.5); }
        
        /* МАГАЗИН */
        .shop-container { 
            display: flex; gap: 30px; margin-bottom: 30px; 
            flex-wrap: wrap; justify-content: center;
        }
        .shop-item { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            padding: 25px; border-radius: 15px; width: 200px; text-align: center;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .shop-icon { font-size: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .shop-val { font-size: 20px; font-weight: bold; color: #00d2ff; margin: 10px 0; }

        /* Громкость */
        .volume-control {
            margin-top: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .vol-label { font-weight: bold; color: #aaa; letter-spacing: 2px; }
        input[type=range] {
            -webkit-appearance: none; width: 200px; height: 8px; background: #333;
            border-radius: 5px; outline: none; border: 1px solid #555;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; background: #00d2ff;
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            transition: transform 0.1s; margin-top: -1px;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* ОВЕРЛЕИ */
        #msg-overlay {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4757; font-size: 30px; font-weight: bold;
            display: none; pointer-events: none; text-shadow: 0 0 10px #ff0000; z-index: 110;
        }
        #boss-title {
            position: absolute; top: 30%; width: 100%; text-align: center;
            font-size: 80px; color: #fff; font-weight: bold;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            display: none; pointer-events: none; z-index: 20;
            font-family: 'Arial Black', sans-serif;
        }
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; transition: opacity 0.8s; z-index: 5;
        }
        #esc-hint {
            position: absolute; top: 15px; right: 20px; 
            color: rgba(255,255,255,0.5); font-weight: bold; 
            pointer-events: none; z-index: 9; font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen">
        <h1>NEON JUMPER</h1>
        <div class="menu-stats">
            СМЕРТЕЙ: <span id="menu-deaths" style="color:#ff4757">0</span> | МОНЕТЫ СГОРАЮТ ПРИ СМЕРТИ!
        </div>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn btn-shop" onclick="openShopFromMenu()">МАГАЗИН</button>
        
        <div class="volume-control">
            <div class="vol-label">ГРОМКОСТЬ: <span id="vol-val-menu">30%</span></div>
            <input type="range" id="vol-slider-menu" min="0" max="1" step="0.01" value="0.3" oninput="updateVolume(this.value)">
        </div>
    </div>

    <div id="shop-screen" class="screen hidden">
        <h1 id="shop-title">УЛУЧШЕНИЯ</h1>
        <div id="bank-display-shop" style="color:#ffd200; font-size:32px; margin-bottom:30px; text-shadow: 0 0 10px #ffd200;">0 💰</div>
        
        <div class="shop-container">
            <div class="shop-item">
                <div class="shop-icon">⚒️</div>
                <div style="font-weight:bold;">УРОН</div>
                <div class="shop-val">УР. <span id="dmg-lvl">1</span></div>
                <div>СИЛА: <span id="dmg-val" style="color:white">1</span></div>
                <button class="btn" style="width:100%; margin:15px 0; font-size:18px; padding:8px;" onclick="buyUpgrade('damage')">
                    <span id="dmg-cost">15</span> 💰
                </button>
            </div>
            <div class="shop-item">
                <div class="shop-icon">❤️</div>
                <div style="font-weight:bold;">ЖИЗНИ</div>
                <div class="shop-val">УР. <span id="hp-lvl">1</span></div>
                <div>МАКС: <span id="hp-val" style="color:white">3</span></div>
                <button class="btn" style="width:100%; margin:15px 0; font-size:18px; padding:8px;" onclick="buyUpgrade('hp')">
                    <span id="hp-cost">15</span> 💰
                </button>
            </div>
            <div class="shop-item">
                <div class="shop-icon">🧪</div>
                <div style="font-weight:bold;">ЛЕЧЕНИЕ</div>
                <div class="shop-val">FULL</div>
                <div>ВОССТАНОВИТЬ</div>
                <button class="btn" style="width:100%; margin:15px 0; font-size:18px; padding:8px;" onclick="buyUpgrade('heal')">
                    <span id="heal-cost">30</span> 💰
                </button>
            </div>
        </div>
        
        <button id="btn-shop-back" class="btn btn-resume" onclick="closeShop()">ПРОДОЛЖИТЬ</button>

        <div class="volume-control" style="margin-top: 10px;">
            <div class="vol-label">ГРОМКОСТЬ: <span id="vol-val-shop">30%</span></div>
            <input type="range" id="vol-slider-shop" min="0" max="1" step="0.01" value="0.3" oninput="updateVolume(this.value)">
        </div>
    </div>

    <div id="ui-bar">
        <div class="stat-box">УР <span id="ui-lvl" class="c-lvl">1</span></div>
        <div class="stat-box">HP <span id="ui-hp" class="c-hp">3</span></div>
        <div class="stat-box">УРОН <span id="ui-dmg" style="color:#fff">1</span></div>
        <div class="stat-box">ПАТРОНЫ <span id="ui-ammo" class="c-ammo">20</span></div>
        <div class="stat-box">УБИТО <span id="ui-kills" class="c-kills">0</span></div>
        <div class="stat-box">💰 <span id="ui-coins" class="c-coins">0</span></div>
        <div class="stat-box">💀 <span id="ui-deaths" class="c-death">0</span></div>
    </div>
    
    <div id="esc-hint">[ESC] ПАУЗА / МАГАЗИН</div>
    <div id="boss-hp-wrapper"><div id="boss-label">БОСС</div><div id="boss-hp-border"><div id="boss-hp-bar"></div></div></div>
    <div id="boss-title">БИТВА С БОССОМ</div>
    <div id="msg-overlay">НЕТ ПАТРОНОВ!</div>
    <div id="flash-overlay"></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- ЗВУКОВОЙ ДВИЖОК ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3; 
    masterGain.connect(audioCtx.destination);

    function updateVolume(val) {
        masterGain.gain.value = val;
        document.getElementById('vol-slider-menu').value = val;
        document.getElementById('vol-slider-shop').value = val;
        const pct = Math.round(val * 100) + "%";
        document.getElementById('vol-val-menu').innerText = pct;
        document.getElementById('vol-val-shop').innerText = pct;
    }
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(masterGain);

        const now = audioCtx.currentTime;

        if (type === 'shoot') {
            osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'jump') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(350, now + 0.1);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'coin') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(1800, now + 0.1);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'ammo') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(600, now + 0.05);
            gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'explosion') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(1, now + 0.2);
            gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'hit') {
            osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.05);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'hurt') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'ui') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'no_ammo') {
            osc.type = 'square'; osc.frequency.setValueAtTime(100, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
            osc.start(now); osc.stop(now + 0.03);
        } else if (type === 'portal') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.linearRampToValueAtTime(880, now + 0.5);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.8);
            osc.start(now); osc.stop(now + 0.8);
        }
    }

    // ДАННЫЕ ИГРОКА И УЛУЧШЕНИЙ
    let upgrades = { damage: 1, maxHp: 3, dmgLevel: 1, hpLevel: 1, dmgCost: 15, hpCost: 15, healCost: 30 };
    let totalDeaths = 0; 

    // КОНФИГУРАЦИЯ ФИЗИКИ
    const CONFIG = {
        gravity: 0.45, groundFriction: 0.83, airFriction: 0.95,
        acceleration: 0.15, maxSpeed: 2.4, jumpForce: -10.5, variableJump: 0.5,
        bulletSpeed: 12, enemyBulletSpeed: 3.5, startAmmo: 25, ammoSpawnRate: 0.15
    };

    let gameState = 'MENU'; 
    let previousState = 'MENU'; 
    let stats = { level: 1, kills: 0, coins: 0 };
    let mouse = { x: 0, y: 0 };
    
    // Игрок: jumpCount - счетчик для двойного прыжка
    let player = { x: 100, y: 100, w: 30, h: 46, vx: 0, vy: 0, hp: 3, maxHp: 3, ammo: 25, cooldown: 0, invul: 0, onGround: false, coyoteTime: 0, jumpBuffer: 0, jumpCount: 0 };
    let platforms = [], enemies = [], bullets = [], enemyBullets = [], particles = [], lootItems = [], portalCoin = null;
    let camera = { x: 0, y: 0 };
    let activeBoss = null;

    // Ссылки на элементы UI
    const menuScreen = document.getElementById('menu-screen');
    const shopScreen = document.getElementById('shop-screen');
    const uiBar = document.getElementById('ui-bar');
    const escHint = document.getElementById('esc-hint');
    const bossWrapper = document.getElementById('boss-hp-wrapper');
    const bossBar = document.getElementById('boss-hp-bar');
    const bossLabel = document.getElementById('boss-label');
    const bossTitle = document.getElementById('boss-title');
    const msgOverlay = document.getElementById('msg-overlay');
    const flashEl = document.getElementById('flash-overlay');
    const btnShopBack = document.getElementById('btn-shop-back');
    const shopTitle = document.getElementById('shop-title');
    const menuDeaths = document.getElementById('menu-deaths');
    const uiDeaths = document.getElementById('ui-deaths');
    const uiKills = document.getElementById('ui-kills');

    // --- УПРАВЛЕНИЕ ИНТЕРФЕЙСОМ ---
    function updateShopUI() {
        let currentMoney = (gameState === 'SHOP' || gameState === 'PAUSE_SHOP') ? stats.coins : 0;
        document.getElementById('bank-display-shop').innerText = `${currentMoney} 💰`;
        document.getElementById('dmg-lvl').innerText = upgrades.dmgLevel;
        document.getElementById('dmg-val').innerText = upgrades.damage;
        document.getElementById('dmg-cost').innerText = upgrades.dmgCost;
        document.getElementById('hp-lvl').innerText = upgrades.hpLevel;
        document.getElementById('hp-val').innerText = upgrades.maxHp;
        document.getElementById('hp-cost').innerText = upgrades.hpCost;
        document.getElementById('heal-cost').innerText = upgrades.healCost;
        menuDeaths.innerText = totalDeaths;
    }

    function openShopFromMenu() {
        playSound('ui');
        stats.coins = 0; previousState = 'MENU';
        menuScreen.classList.add('hidden'); shopScreen.classList.remove('hidden');
        shopTitle.innerText = "УЛУЧШЕНИЯ (ГЛАВНОЕ МЕНЮ)"; btnShopBack.innerText = "НАЗАД"; btnShopBack.className = "btn btn-back";
        gameState = 'SHOP'; updateShopUI();
    }

    function togglePauseShop() {
        if(gameState === 'GAME') {
            playSound('ui');
            previousState = 'GAME'; gameState = 'PAUSE_SHOP';
            shopScreen.classList.remove('hidden'); shopTitle.innerText = "ПАУЗА / МАГАЗИН";
            btnShopBack.innerText = "ВЕРНУТЬСЯ В ИГРУ"; btnShopBack.className = "btn btn-resume";
            updateShopUI();
        } else if (gameState === 'PAUSE_SHOP') closeShop();
    }

    function closeShop() {
        playSound('ui');
        shopScreen.classList.add('hidden');
        if (previousState === 'MENU') { menuScreen.classList.remove('hidden'); gameState = 'MENU'; } 
        else { gameState = 'GAME'; player.maxHp = upgrades.maxHp; if(player.hp>player.maxHp)player.hp=player.maxHp; updateGameUI(); }
    }

    function buyUpgrade(type) {
        if(type === 'damage' && stats.coins >= upgrades.dmgCost) {
            playSound('coin'); stats.coins -= upgrades.dmgCost; upgrades.damage++; upgrades.dmgLevel++; upgrades.dmgCost += 5;
        } else if (type === 'hp' && stats.coins >= upgrades.hpCost) {
            playSound('coin'); stats.coins -= upgrades.hpCost; upgrades.maxHp++; upgrades.hpLevel++; upgrades.hpCost += 5;
            if(gameState === 'PAUSE_SHOP') player.hp++;
        } else if (type === 'heal') {
            if (stats.coins >= upgrades.healCost) {
                if (gameState === 'PAUSE_SHOP' && player.hp < player.maxHp) {
                     playSound('coin'); stats.coins -= upgrades.healCost; player.hp = player.maxHp; upgrades.healCost += 5;
                } else playSound('no_ammo');
            } else playSound('no_ammo');
        } else playSound('no_ammo');
        updateShopUI(); if(gameState === 'PAUSE_SHOP') updateGameUI();
    }

    function startGame() {
        playSound('portal');
        menuScreen.classList.add('hidden'); uiBar.style.display = 'flex'; escHint.style.display = 'block';
        stats.coins = 0; gameState = 'GAME'; player.maxHp = upgrades.maxHp; generateWorld(true);
    }

    function returnToMenu() {
        gameState = 'MENU'; stats.coins = 0;
        uiBar.style.display = 'none'; escHint.style.display = 'none'; bossWrapper.style.display = 'none'; bossTitle.style.display = 'none';
        menuScreen.classList.remove('hidden'); updateShopUI();
    }

    // --- ГЕНЕРАЦИЯ МИРА ---
    function generateWorld(resetGame = false) {
        if(resetGame) { stats.level = 1; stats.kills = 0; stats.coins = 0; player.hp = player.maxHp; player.ammo = CONFIG.startAmmo; }
        platforms=[]; enemies=[]; bullets=[]; enemyBullets=[]; particles=[]; lootItems=[]; portalCoin=null; activeBoss=null;
        bossWrapper.style.display = 'none';
        player.x=100; player.y=100; player.vx=0; player.vy=0; player.invul=60; player.jumpCount=0;
        player.ammo = Math.max(player.ammo, 15);
        updateGameUI();
        if (stats.level === 5) setupMiniBoss();
        else if (stats.level === 10) setupFinalBoss();
        else setupNormalLevel();
    }

    function setupNormalLevel() {
        platforms.push({ x: 0, y: window.innerHeight - 100, w: 400, h: 40, color: '#2c3e50' });
        let len = 15 + Math.min(stats.level * 2, 45), cx = 450, cy = window.innerHeight - 100;
        for(let i=0; i<len; i++) {
            let w = 80+Math.random()*120, gap = 40+Math.random()*50; 
            cy += (Math.random()-0.5)*180;
            if(cy>window.innerHeight-80) cy=window.innerHeight-150; if(cy<150) cy=200;
            platforms.push({ x: cx, y: cy, w: w, h: 20, color: '#34495e' });
            if(w>60 && Math.random()<0.45) {
                let isS = (stats.level>=3 && Math.random()>0.6), hp = isS ? 5 : 3;
                enemies.push({ type: isS?'shooter':'walker', x:cx+20, y:cy-40, w:30, h:30, startX:cx, endX:cx+w, speed:1.2+(stats.level*0.05), dir:1, hp:hp, maxHp:hp, shootTimer:100+Math.random()*100 });
            }
            spawnLoot(cx, cy, w); cx += w + gap;
        }
        let last = platforms[platforms.length-1];
        portalCoin = { x: last.x + last.w/2 - 15, y: last.y - 50, size: 30, pulse: 0 };
    }

    function setupMiniBoss() {
        showTitle("⚠️ МИНИ-БОСС ⚠️", "#e67e22");
        platforms.push({ x:-200, y:window.innerHeight-100, w:1500, h:100, color:'#444' }); 
        platforms.push({ x:-200, y:0, w:50, h:window.innerHeight, color:'#222' }); 
        platforms.push({ x:1250, y:0, w:50, h:window.innerHeight, color:'#222' });
        spawnAmmo(4, 300, 200);
        activeBoss = { type:'boss', variant:'mini', x:800, y:window.innerHeight-250, w:60, h:60, vx:0, vy:0, dir:-1, hp:80, maxHp:80, actionTimer:0 };
        enemies.push(activeBoss);
        bossLabel.innerText="МИНИ-БОСС"; bossLabel.style.color="#e67e22"; bossBar.style.background="linear-gradient(90deg, #e67e22, #f1c40f)"; bossWrapper.style.display='flex';
    }

    function setupFinalBoss() {
        showTitle("👹 ФИНАЛЬНЫЙ БОСС 👹", "#c0392b");
        platforms.push({ x:-200, y:window.innerHeight-100, w:2000, h:100, color:'#2c3e50' }); 
        platforms.push({ x:-200, y:0, w:50, h:window.innerHeight, color:'#222' }); 
        platforms.push({ x:1750, y:0, w:50, h:window.innerHeight, color:'#222' });
        spawnAmmo(8, 300, 250);
        activeBoss = { type:'boss', variant:'final', x:1200, y:window.innerHeight-250, w:120, h:120, vx:0, vy:0, dir:-1, hp:200, maxHp:200, actionTimer:0 };
        enemies.push(activeBoss);
        bossLabel.innerText="ФИНАЛЬНЫЙ БОСС"; bossLabel.style.color="#c0392b"; bossBar.style.background="linear-gradient(90deg, #c0392b, #8e44ad)"; bossWrapper.style.display='flex';
    }

    function spawnLoot(x,y,w) { if(Math.random()<0.6) lootItems.push({type:'coin',x:x+w/2,y:y-30,size:14}); if(Math.random()<CONFIG.ammoSpawnRate) lootItems.push({type:'ammo',x:x+w/2,y:y-30,w:20,h:20,amount:5}); }
    function spawnAmmo(n,x,s) { for(let i=0; i<n; i++) lootItems.push({type:'ammo',x:x+i*s,y:window.innerHeight-140,w:20,h:20,amount:5}); }
    function showTitle(t,c) { 
        playSound('portal');
        bossTitle.innerText=t; bossTitle.style.color=c; bossTitle.style.display='block'; setTimeout(()=>bossTitle.style.display='none',3000); 
    }

    // --- УПРАВЛЕНИЕ ---
    const keys = {};
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mousedown', e => { if(e.button === 0 && gameState === 'GAME') shoot(); });
    document.addEventListener('keydown', e => {
        if (e.code === 'Escape') { if (gameState === 'GAME' || gameState === 'PAUSE_SHOP') togglePauseShop(); return; }
        keys[e.code] = true;
        if ((e.code === 'Space' || e.code === 'ArrowUp') && gameState === 'GAME') {
            // Логика прыжка:
            // Если игрок на боссе (5 или 10 ур), не на земле и еще не использовал двойной прыжок
            if((stats.level === 5 || stats.level === 10) && !player.onGround && player.coyoteTime <= 0 && player.jumpCount < 2) {
                 player.vy = CONFIG.jumpForce; 
                 player.jumpCount = 2; // Блокируем дальнейшие прыжки до касания земли
                 playSound('jump');
                 spawnParticles(player.x+player.w/2, player.y+player.h, '#fff', 10);
                 player.jumpBuffer = 0;
            } else {
                 player.jumpBuffer = 10; 
            }
        }
    });
    document.addEventListener('keyup', e => {
        keys[e.code] = false;
        if ((e.code === 'Space' || e.code === 'ArrowUp') && gameState === 'GAME') { if (player.vy < -2) player.vy *= CONFIG.variableJump; }
    });

    function shoot() {
        if(player.cooldown > 0) return;
        if(player.ammo <= 0) { playSound('no_ammo'); msgOverlay.style.display='block'; setTimeout(()=>msgOverlay.style.display='none',500); return; }
        playSound('shoot');
        player.ammo--; updateGameUI(); player.cooldown = 12;
        const pcx=player.x+player.w/2, pcy=player.y+player.h/3;
        const angle = Math.atan2(mouse.y - pcy, (mouse.x + camera.x) - pcx);
        bullets.push({ x:pcx, y:pcy, vx:Math.cos(angle)*CONFIG.bulletSpeed, vy:Math.sin(angle)*CONFIG.bulletSpeed, life:80 });
    }

    // --- ОБНОВЛЕНИЕ СОСТОЯНИЯ ---
    function update() {
        if(gameState !== 'GAME') return;

        if(player.cooldown > 0) player.cooldown--;
        if(player.invul > 0) player.invul--;
        if(player.jumpBuffer > 0) player.jumpBuffer--;
        if(player.coyoteTime > 0) player.coyoteTime--;

        if (keys['ArrowRight'] || keys['KeyD']) {
            if (player.vx < CONFIG.maxSpeed) player.vx += CONFIG.acceleration;
        } else if (keys['ArrowLeft'] || keys['KeyA']) {
            if (player.vx > -CONFIG.maxSpeed) player.vx -= CONFIG.acceleration;
        } else {
            let friction = player.onGround ? CONFIG.groundFriction : CONFIG.airFriction;
            player.vx *= friction;
            if (Math.abs(player.vx) < 0.05) player.vx = 0;
        }

        player.vy += CONFIG.gravity;

        // Прыжок с земли
        if (player.jumpBuffer > 0 && (player.onGround || player.coyoteTime > 0)) {
            playSound('jump'); player.vy = CONFIG.jumpForce; player.jumpBuffer = 0; player.coyoteTime = 0; player.onGround = false;
            player.jumpCount = 1; 
        }

        player.x += player.vx; player.y += player.vy;

        let groundedThisFrame = false;
        platforms.forEach(p => {
            if (player.x + player.w > p.x && player.x < p.x + p.w &&
                player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + 20 &&
                player.vy >= 0) {
                player.vy = 0; player.y = p.y - player.h; groundedThisFrame = true;
            }
        });
        if (groundedThisFrame) { 
            player.onGround = true; 
            player.coyoteTime = 6; 
            player.jumpCount = 0; 
        } else { player.onGround = false; }
        
        if (player.y > canvas.height + 200) die();

        // Обработка пуль игрока
        for(let i=bullets.length-1; i>=0; i--) {
            let b = bullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
            let hitWall = platforms.some(p => rectCollide({x:b.x, y:b.y, w:5, h:5}, p));
            if(b.life <= 0 || hitWall) { if(hitWall) spawnParticles(b.x, b.y, '#00d2ff', 3); bullets.splice(i,1); continue; }
            for(let j=enemies.length-1; j>=0; j--) {
                let e = enemies[j];
                if(rectCollide({x:b.x, y:b.y, w:5, h:5}, e)) {
                    e.hp -= upgrades.damage; 
                    playSound('hit');
                    bullets.splice(i,1); spawnParticles(e.x+e.w/2, e.y+e.h/2, e.type==='boss'?'#fff':'#e74c3c', 5);
                    if(e.hp <= 0) killEnemy(e, j);
                    break;
                }
            }
        }
        // Обработка пуль врагов
        for(let i=enemyBullets.length-1; i>=0; i--) {
            let b = enemyBullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
            if(rectCollide(player, {x:b.x, y:b.y, w:8, h:8})) { takeDamage(); enemyBullets.splice(i, 1); continue; }
            if(platforms.some(p => rectCollide({x:b.x, y:b.y, w:8, h:8}, p))) { enemyBullets.splice(i, 1); continue; }
            if(b.life <= 0) enemyBullets.splice(i,1);
        }
        // Враги
        enemies.forEach(e => {
            if(e.type !== 'boss') { e.x += e.speed * 0.5 * e.dir; if(e.x < e.startX || e.x > e.endX) e.dir *= -1; }
            if(e.type === 'shooter') {
                e.shootTimer--;
                if(e.shootTimer <= 0 && Math.abs(player.x - e.x) < 600) {
                    let ang = Math.atan2((player.y+20)-(e.y+15), (player.x+15)-(e.x+15));
                    enemyBullets.push({ x: e.x+15, y: e.y+15, vx: Math.cos(ang)*CONFIG.enemyBulletSpeed, vy: Math.sin(ang)*CONFIG.enemyBulletSpeed, life: 150 });
                    e.shootTimer = 180 + Math.random()*60;
                }
            } else if(e.type === 'boss') updateBossAI(e);
            if(rectCollide(player, e) && player.invul <= 0) takeDamage();
        });
        // Сбор лута
        for(let i=lootItems.length-1; i>=0; i--) {
            let item = lootItems[i];
            let hb = item.type==='coin' ? {x:item.x-item.size, y:item.y-item.size, w:item.size*2, h:item.size*2} : item;
            if(rectCollide(player, hb)) {
                if(item.type === 'coin') { 
                    playSound('coin'); stats.coins++; spawnParticles(item.x, item.y, '#ffd200', 5); 
                } else { 
                    playSound('ammo'); player.ammo += item.amount; spawnParticles(item.x, item.y, '#2ecc71', 5); 
                }
                updateGameUI();
                lootItems.splice(i, 1);
            }
        }
        // Портал
        if(portalCoin) {
            portalCoin.pulse += 0.1;
            let dx = (player.x+player.w/2)-(portalCoin.x+portalCoin.size/2), dy = (player.y+player.h/2)-(portalCoin.y+portalCoin.size/2);
            if(Math.sqrt(dx*dx+dy*dy) < 40) { 
                playSound('portal'); stats.level++; flashEl.style.opacity = 1; setTimeout(() => flashEl.style.opacity = 0, 800); generateWorld(false); 
            }
        }

        let tx = player.x - canvas.width/2 + player.w/2;
        if(activeBoss) tx = Math.max(-200, Math.min(tx, 1200));
        camera.x += (tx - camera.x) * 0.08;
        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if(p.life<=0) particles.splice(i,1); });
    }

    function updateBossAI(b) {
        b.vy += CONFIG.gravity; b.x += b.vx; b.y += b.vy;
        platforms.forEach(p => { if(rectCollide(b, p) && b.vy >= 0) { b.vy = 0; b.y = p.y - b.h; b.vx = 0; } });
        b.actionTimer--; b.dir = player.x > b.x ? 1 : -1;
        if(b.actionTimer <= 0) {
            if(Math.random() < 0.45) { b.vy = -12; b.vx = b.dir * 4; b.actionTimer = 100; }
            else {
                let cnt = b.variant === 'mini' ? 2 : 4;
                for(let k=-1; k<=1; k+=(2/cnt)) {
                    let ang = Math.atan2((player.y+20)-(b.y+b.h/2), (player.x+15)-(b.x+b.w/2)) + k*0.3;
                    enemyBullets.push({ x:b.x+b.w/2, y:b.y+b.h/2, vx: Math.cos(ang)*CONFIG.enemyBulletSpeed, vy: Math.sin(ang)*CONFIG.enemyBulletSpeed, life: 150 });
                }
                b.actionTimer = 90;
            }
        }
        bossBar.style.width = Math.max(0, (b.hp/b.maxHp)*100) + '%';
    }

    function killEnemy(e, idx) {
        enemies.splice(idx, 1);
        playSound('explosion');
        if(e.type === 'boss') {
            bossWrapper.style.display = 'none'; activeBoss = null;
            portalCoin = { x: e.x+e.w/2-15, y: e.y+e.h-50, size: 30, pulse: 0 };
            for(let k=0; k<30; k++) spawnParticles(e.x+Math.random()*e.w, e.y+Math.random()*e.h, '#e74c3c', 20);
        } else if (Math.random() < 0.3) lootItems.push({type: 'ammo', x:e.x, y:e.y, w:20, h:20, amount:3});
        stats.kills++; updateGameUI();
    }

    function takeDamage() {
        playSound('hurt'); player.hp--; player.invul = 60; player.vy = -8; updateGameUI(); spawnParticles(player.x, player.y, '#ff4757', 15);
        if(player.hp <= 0) die();
    }

    function die() {
        playSound('explosion'); for(let k in keys) keys[k] = false; 
        totalDeaths++;
        alert(`ЗАБЕГ ОКОНЧЕН\nДостигнут уровень: ${stats.level}\nУбито врагов: ${stats.kills}\nВсе накопленные монеты потеряны!`);
        returnToMenu();
    }

    function rectCollide(r1, r2) {
        let b1 = r1.w ? r1 : {x:r1.x,y:r1.y,w:r1.w,h:r1.h};
        let b2 = r2.w ? r2 : {x:r2.x,y:r2.y,w:r2.w,h:r2.h};
        if(r2.size) { b2.w=r2.size*2; b2.h=r2.size*2; b2.x=r2.x-r2.size; b2.y=r2.y-r2.size; }
        return (b1.x < b2.x+b2.w && b1.x+b1.w > b2.x && b1.y < b2.y+b2.h && b1.y+b1.h > b2.y);
    }
    function spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) particles.push({ x, y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, life:30, color }); }
    
    function updateGameUI() {
        document.getElementById('ui-lvl').innerText = stats.level;
        document.getElementById('ui-hp').innerText = player.hp + "/" + player.maxHp;
        document.getElementById('ui-dmg').innerText = upgrades.damage;
        document.getElementById('ui-ammo').innerText = player.ammo;
        document.getElementById('ui-ammo').style.color = player.ammo<=5 ? 'red' : '#2ecc71';
        document.getElementById('ui-coins').innerText = stats.coins;
        uiDeaths.innerText = totalDeaths;
        uiKills.innerText = stats.kills;
    }

    // --- ОТРИСОВКА ---
    function draw() {
        if(gameState === 'MENU' || gameState === 'SHOP') { ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width,canvas.height); return; }

        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        if(stats.level===5) { grad.addColorStop(0, '#1e130c'); grad.addColorStop(1, '#9a8478'); }
        else if(stats.level===10) { grad.addColorStop(0, '#2c0000'); grad.addColorStop(1, '#440000'); }
        else { 
            let hue = (stats.level * 30) % 360; 
            grad.addColorStop(0, `hsl(${hue}, 20%, 5%)`); 
            grad.addColorStop(1, `hsl(${hue}, 40%, 15%)`); 
        }
        ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.save(); ctx.translate(-Math.floor(camera.x), 0);

        // Платформы
        ctx.shadowBlur = 10; ctx.shadowColor = '#00d2ff';
        platforms.forEach(p => { 
            ctx.fillStyle = '#000'; ctx.strokeStyle = '#00d2ff'; ctx.lineWidth = 2;
            ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeRect(p.x, p.y, p.w, p.h); 
        });
        ctx.shadowBlur = 0;

        // Предметы
        lootItems.forEach(i => {
            if(i.type === 'coin') {
                ctx.fillStyle='#ffd200'; ctx.beginPath(); ctx.arc(i.x, i.y, i.size, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 15; ctx.shadowColor = '#ffd200'; ctx.fill(); ctx.shadowBlur = 0;
            } else {
                ctx.shadowBlur = 10; ctx.shadowColor = '#2ecc71';
                ctx.fillStyle = '#053312'; ctx.fillRect(i.x, i.y, i.w, i.h);
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.strokeRect(i.x, i.y, i.w, i.h);
                ctx.beginPath(); ctx.moveTo(i.x, i.y); ctx.lineTo(i.x+i.w, i.y+i.h); ctx.moveTo(i.x+i.w, i.y); ctx.lineTo(i.x, i.y+i.h); ctx.stroke();
                ctx.shadowBlur = 0;
            }
        });

        // Враги
        enemies.forEach(e => {
            ctx.shadowBlur = 15; 
            if(e.type === 'boss') {
                ctx.shadowColor = e.variant==='mini'?'#e67e22':'#c0392b';
                ctx.fillStyle = e.variant==='mini'?'#e67e22':'#c0392b'; ctx.fillRect(e.x,e.y,e.w,e.h);
                ctx.fillStyle='#fff'; ctx.shadowBlur = 0;
                ctx.fillRect(e.x+(e.dir==1?e.w*0.4:e.w*0.2), e.y+e.h*0.2, 15, 15); ctx.fillRect(e.x+(e.dir==1?e.w*0.7:e.w*0.5), e.y+e.h*0.2, 15, 15
